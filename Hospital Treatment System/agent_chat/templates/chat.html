{% extends 'base.html' %}
{% load static %}
{% block content_block %}

<style>
    .chat-container {
        max-width: 800px;
        margin: 0 auto;
        background: #fff;
        border-radius: 8px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        height: 70vh;
        min-height: 500px;
    }
    .chat-header {
        background: linear-gradient(135deg, #0e90d2, #5eb5e0);
        color: #fff;
        padding: 15px 20px;
        font-size: 16px;
        font-weight: bold;
    }
    .chat-header small {
        font-weight: normal;
        opacity: 0.8;
        font-size: 12px;
    }
    .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        background: #f8f9fa;
    }
    .message {
        margin-bottom: 16px;
        display: flex;
    }
    .message.user {
        justify-content: flex-end;
    }
    .message .bubble {
        max-width: 75%;
        padding: 12px 16px;
        border-radius: 16px;
        line-height: 1.5;
        font-size: 14px;
        white-space: pre-wrap;
    }
    .message.user .bubble {
        background: #0e90d2;
        color: #fff;
        border-bottom-right-radius: 4px;
    }
    .message.assistant .bubble {
        background: #fff;
        color: #333;
        border: 1px solid #e0e0e0;
        border-bottom-left-radius: 4px;
    }
    .message .avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
    }
    .message.user .avatar {
        background: #0e90d2;
        color: #fff;
        margin-left: 10px;
        order: 1;
    }
    .message.assistant .avatar {
        background: #10a050;
        color: #fff;
        margin-right: 10px;
    }
    .chat-input-area {
        padding: 15px 20px;
        background: #fff;
        border-top: 1px solid #eee;
        display: flex;
        gap: 10px;
        align-items: center;
    }
    .chat-input-area textarea {
        flex: 1;
        border: 1px solid #ddd;
        border-radius: 20px;
        padding: 10px 16px;
        resize: none;
        font-size: 14px;
        outline: none;
        min-height: 20px;
        max-height: 80px;
    }
    .chat-input-area textarea:focus {
        border-color: #0e90d2;
    }
    .chat-input-area .btn-send {
        background: #0e90d2;
        color: #fff;
        border: none;
        border-radius: 50%;
        width: 42px;
        height: 42px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .chat-input-area .btn-send:hover {
        background: #0c7ab5;
    }
    .chat-input-area .btn-upload {
        background: #f0f0f0;
        color: #666;
        border: none;
        border-radius: 50%;
        width: 42px;
        height: 42px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
    }
    .chat-input-area .btn-upload:hover {
        background: #e0e0e0;
    }
    .message .bubble img {
        max-width: 100%;
        border-radius: 8px;
        margin-top: 8px;
    }
    .typing-indicator {
        display: none;
        padding: 10px 0;
    }
    .typing-indicator span {
        display: inline-block;
        width: 8px;
        height: 8px;
        background: #ccc;
        border-radius: 50%;
        margin-right: 4px;
        animation: typing 1.4s infinite both;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    /* 历史记录弹窗 */
    .history-btn {
        background: none;
        border: 1px solid rgba(255,255,255,0.4);
        color: #fff;
        border-radius: 4px;
        padding: 2px 10px;
        font-size: 12px;
        cursor: pointer;
        margin-left: 10px;
        transition: all 0.2s;
    }
    .history-btn:hover {
        background: rgba(255,255,255,0.2);
    }
    .history-modal {
        display: none;
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0,0,0,0.4);
        z-index: 9999;
        justify-content: center;
        align-items: center;
    }
    .history-modal.active {
        display: flex;
    }
    .history-modal-content {
        background: #fff;
        border-radius: 12px;
        width: 90%;
        max-width: 500px;
        max-height: 70vh;
        overflow-y: auto;
        box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        padding: 20px;
    }
    .history-modal-content h3 {
        margin: 0 0 5px 0;
        color: #0e90d2;
    }
    .history-modal-content .close-btn {
        float: right;
        font-size: 24px;
        cursor: pointer;
        color: #999;
    }
    .history-modal-content .close-btn:hover {
        color: #333;
    }
    .history-item {
        border-bottom: 1px solid #eee;
        padding: 12px 0;
    }
    .history-item:last-child {
        border-bottom: none;
    }
    .history-item .q {
        font-weight: bold;
        color: #333;
        margin-bottom: 4px;
    }
    .history-item .meta {
        font-size: 12px;
        color: #999;
    }
    .history-empty {
        text-align: center;
        padding: 40px 0;
        color: #ccc;
    }
    @keyframes typing {
        0% { opacity: 0.3; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.2); }
        100% { opacity: 0.3; transform: scale(1); }
    }
    .source-link {
        font-size: 12px;
        color: #999;
        margin-top: 4px;
    }
</style>

<div class="am-g">
    <div class="am-u-md-12">
        <div class="chat-container">
            <div class="chat-header">
                🤖 AI 医疗助手
                <small>— 症状咨询 · CT识别 · 医学知识</small>
                <button class="history-btn" onclick="openHistory()">📋 提问记录</button>
            </div>

            <div class="chat-messages" id="chat-messages">
                <div class="message assistant">
                    <div class="avatar">🤖</div>
                    <div class="bubble">
                        你好！我是AI医疗助手，有什么可以帮你的？<br><br>
                        你可以问我：
                        <br>🔹 "发烧咳嗽挂什么科？"
                        <br>🔹 "什么是肺炎？有什么症状？"
                        <br>🔹 上传CT影像让我识别
                        <br>🔹 "论坛里关于XX有什么讨论？"
                        <br><br>

                    </div>
                </div>
            </div>

            <div class="chat-input-area">
                <button class="btn-upload" id="btn-upload" title="上传CT图片">📷</button>
                <input type="file" id="file-input" accept="image/*" style="display:none">
                <textarea id="message-input" rows="1" placeholder="输入你的问题..." style="min-height:20px;"></textarea>
                <button class="btn-send" id="btn-send">➤</button>
            </div>
        </div>
    </div>
</div>

<script>
    const messagesEl = document.getElementById('chat-messages');
    const inputEl = document.getElementById('message-input');
    const sendBtn = document.getElementById('btn-send');
    const fileInput = document.getElementById('file-input');
    const uploadBtn = document.getElementById('btn-upload');
    let isProcessing = false;

    // 自动调整 textarea 高度
    inputEl.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 80) + 'px';
    });

    // Enter 发送（Shift+Enter 换行）
    inputEl.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    // 上传按钮
    uploadBtn.addEventListener('click', function() {
        fileInput.click();
    });

    fileInput.addEventListener('change', function() {
        if (this.files && this.files[0]) {
            uploadImage(this.files[0]);
        }
    });

    // 发送按钮
    sendBtn.addEventListener('click', sendMessage);

    function addMessage(role, content) {
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message ' + role;

        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        avatar.textContent = role === 'user' ? '👤' : '🤖';

        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.innerHTML = content.replace(/\n/g, '<br>');

        if (role === 'user') {
            msgDiv.appendChild(bubble);
            msgDiv.appendChild(avatar);
        } else {
            msgDiv.appendChild(avatar);
            msgDiv.appendChild(bubble);
        }

        messagesEl.appendChild(msgDiv);
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function showTyping() {
        const div = document.createElement('div');
        div.className = 'message assistant';
        div.id = 'typing-indicator';
        div.innerHTML = '<div class="avatar">🤖</div><div class="bubble typing-indicator" style="display:block;"><span></span><span></span><span></span></div>';
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function hideTyping() {
        const el = document.getElementById('typing-indicator');
        if (el) el.remove();
    }

    async function sendMessage() {
        const text = inputEl.value.trim();
        if (!text || isProcessing) return;

        isProcessing = true;
        inputEl.value = '';
        inputEl.style.height = 'auto';

        addMessage('user', text);
        showTyping();

        try {
            const resp = await fetch('/chat/api/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: text, action: 'chat'}),
            });
            const data = await resp.json();
            hideTyping();

            if (data.reply) {
                addMessage('assistant', data.reply);
            } else if (data.error) {
                addMessage('assistant', '❌ ' + data.error);
            }
        } catch (err) {
            hideTyping();
            addMessage('assistant', '❌ 网络错误，请稍后重试');
        }

        isProcessing = false;
    }

    async function uploadImage(file) {
        if (isProcessing) return;
        isProcessing = true;

        const formData = new FormData();
        formData.append('image', file);
        formData.append('model', 'resnet50');

        // 显示上传中的消息
        addMessage('user', '📷 正在上传CT影像...');
        showTyping();

        try {
            // 先上传图片
            const uploadResp = await fetch('/chat/api/ct/', {
                method: 'POST',
                body: formData,
            });
            const uploadData = await uploadResp.json();

            hideTyping();

            if (uploadData.success) {
                // 肺炎分类结果
                let resultMsg = '📷 CT影像分析结果：\n\n' +
                    '【肺炎诊断】\n' +
                    '结果：' + uploadData.result + '\n' +
                    '置信度：' + (uploadData.confidence * 100).toFixed(2) + '%\n' +
                    '模型：' + uploadData.model;

                // YOLO结节检测结果
                const nd = uploadData.nodule_detection;
                if (nd && nd.success) {
                    resultMsg += '\n\n【肺结节检测】\n';
                    if (nd.count > 0) {
                        resultMsg += '检出 ' + nd.count + ' 个结节：\n';
                        for (let i = 0; i < nd.nodules.length; i++) {
                            const n = nd.nodules[i];
                            const box = n.bbox;
                            const size = Math.max(box[2] - box[0], box[3] - box[1]);
                            resultMsg += '  结节' + (i+1) + '：位置(' + box[0] + ',' + box[1] + ')-(' + box[2] + ',' + box[3] + ')' +
                                '，大小约' + size + '像素，置信度' + (n.confidence * 100).toFixed(1) + '%\n';
                        }
                    } else {
                        resultMsg += '未检测到结节。\n';
                    }
                }

                // 追加医学知识查询
                const kbResp = await fetch('/chat/api/', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        message: '关于"' + uploadData.result + '"的医学知识',
                        action: 'chat',
                    }),
                });
                const kbData = await kbResp.json();

                let finalReply = resultMsg;
                if (kbData.reply && !kbData.reply.startsWith('抱歉')) {
                    finalReply += '\n\n---\n📖 相关知识\n' + kbData.reply;
                }

                addMessage('assistant', finalReply);
            } else {
                addMessage('assistant', '❌ 识别失败：' + (uploadData.error || '未知错误'));
            }
        } catch (err) {
            hideTyping();
            addMessage('assistant', '❌ 上传失败，请稍后重试');
        }

        isProcessing = false;
        fileInput.value = '';
    }
</script>

<!-- 历史记录弹窗 -->
<div class="history-modal" id="history-modal">
    <div class="history-modal-content">
        <span class="close-btn" onclick="closeHistory()">&times;</span>
        <h3>📋 我的提问记录</h3>
        <p style="color:#999; font-size:13px; margin-top:5px;">最近 3 条</p>
        <div id="history-list">
            <div class="history-empty" id="history-loading">加载中...</div>
        </div>
    </div>
</div>

<script>
function openHistory() {
    var modal = document.getElementById('history-modal');
    modal.classList.add('active');
    document.getElementById('history-loading').style.display = 'block';
    document.getElementById('history-list').innerHTML = '<div class="history-empty" id="history-loading">加载中...</div>';

    fetch('/chat/api/history/')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            var list = document.getElementById('history-list');
            if (!data.history || data.history.length === 0) {
                list.innerHTML = '<div class="history-empty">暂无提问记录</div>';
                return;
            }
            var html = '';
            data.history.forEach(function(item) {
                html += '<div class="history-item">' +
                    '<div class="q">' + item.question + '</div>' +
                    '<div class="meta">' + item.time + '</div>' +
                    '</div>';
            });
            list.innerHTML = html;
        })
        .catch(function() {
            document.getElementById('history-list').innerHTML =
                '<div class="history-empty">加载失败</div>';
        });
}

function closeHistory() {
    document.getElementById('history-modal').classList.remove('active');
}

// 点击遮罩关闭
document.getElementById('history-modal').addEventListener('click', function(e) {
    if (e.target === this) closeHistory();
});
</script>
{% endblock %}
